services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_PORT: "50080"
    ports:
      - "50080:50080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - autobot

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://api.autobot.co.id}
      NUXT_PUBLIC_WS_URL: ${NUXT_PUBLIC_WS_URL:-wss://api.autobot.co.id/ws}
    ports:
      - "50081:50081"
    networks:
      - autobot

  wasigap:
    build:
      context: .
      dockerfile: docker/Dockerfile.wasigap
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "50082"
    ports:
      - "50082:50082"
    networks:
      - autobot

networks:
  autobot:
    driver: bridge
