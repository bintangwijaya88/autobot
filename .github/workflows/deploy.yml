name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  WASIGAP_IMAGE: ghcr.io/${{ github.repository }}/wasigap

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/api/go.sum

      - name: Test API
        working-directory: apps/api
        run: go test ./... -v -cover

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web (type check)
        working-directory: apps/web
        run: npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push WaSigap
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.wasigap
          push: true
          tags: |
            ${{ env.WASIGAP_IMAGE }}:latest
            ${{ env.WASIGAP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/autobot

            # Sync compose files
            git pull origin main

            # Pull latest images
            docker compose -f docker-compose.deploy.yml pull api web wasigap

            # Run migrations
            docker compose -f docker-compose.deploy.yml run --rm api /server migrate up

            # Restart services
            docker compose -f docker-compose.deploy.yml up -d --no-deps api web wasigap

            # Cleanup
            docker image prune -f

            # Health check
            sleep 5
            curl -f http://localhost:50050/api/health || exit 1
            echo "Deploy successful!"
