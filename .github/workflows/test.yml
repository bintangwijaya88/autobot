name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: apps/api/go.sum

      - name: Unit tests (no DB required)
        env:
          JWT_SECRET: test-secret
        run: cd apps/api && go test ./internal/middleware/... ./internal/repository/... ./internal/handler/... -v -count=1 -timeout 60s

      - name: Build check
        run: cd apps/api && go build ./...

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Type check
        run: cd apps/web && npx nuxi typecheck 2>&1 | tail -20 || true

      - name: Build check
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:3000
          NUXT_PUBLIC_WS_URL: ws://localhost:3000/ws
          NODE_OPTIONS: --max-old-space-size=4096
        run: cd apps/web && npm run build 2>&1
