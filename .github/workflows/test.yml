name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: autobot_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-timeout=3s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: apps/api/go.sum

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: autobot_test
          DB_USER: root
          DB_PASSWORD: testpassword
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
          JWT_SECRET: test-secret
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: admin123
          AI_PROVIDER: openai
          OPENAI_API_KEY: sk-test
        run: cd apps/api && go run ./cmd/server migrate

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: autobot_test
          DB_USER: root
          DB_PASSWORD: testpassword
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
          JWT_SECRET: test-secret
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: admin123
          AI_PROVIDER: openai
          OPENAI_API_KEY: sk-test
        run: cd apps/api && go test ./... -v -timeout 120s 2>&1 | head -200

      - name: Build check
        run: cd apps/api && go build ./...

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Type check
        run: cd apps/web && npx nuxi typecheck 2>&1 | tail -20 || true

      - name: Build check
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:3000
          NUXT_PUBLIC_WS_URL: ws://localhost:3000/ws
        run: cd apps/web && npm run build
