services:
  api:
    image: autobot-api-cp:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_PORT: "50050"
    ports:
      - "50050:50050"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - autobot

  web:
    image: autobot-web-cp:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://autobot.co.id:50050}
      NUXT_PUBLIC_WS_URL: ${NUXT_PUBLIC_WS_URL:-ws://autobot.co.id:50050/ws}
      HOST: "0.0.0.0"
      PORT: "50081"
    ports:
      - "50081:50081"
    networks:
      - autobot


networks:
  autobot:
    driver: bridge
