services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.deploy
      target: api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_PORT: "50050"
    ports:
      - "50050:50050"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - autobot

  web:
    build:
      context: .
      dockerfile: Dockerfile.deploy
      target: web
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NUXT_API_BASE: ${NUXT_API_BASE:-http://api:50050}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-}
      NUXT_PUBLIC_WS_URL: ${NUXT_PUBLIC_WS_URL:-wss://autobot.co.id/ws}
      HOST: "0.0.0.0"
      PORT: "50081"
    ports:
      - "50081:50081"
    networks:
      - autobot


  wasigap:
    image: ghcr.io/bintangwijaya88/autobot/wasigap:latest
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "50082"
    ports:
      - "50082:50082"
    networks:
      - autobot

networks:
  autobot:
    driver: bridge
